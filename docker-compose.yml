services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_EMERGENCY_KEY=${GROQ_EMERGENCY_KEY:-}
      - GROQ_TOKENS_PER_KEY=${GROQ_TOKENS_PER_KEY:-6000}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - PORT=8000
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host
    depends_on:
      - backend