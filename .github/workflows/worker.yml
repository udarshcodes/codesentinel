name: CodeSentinel Worker

on:
  workflow_dispatch:
    inputs:
      task_id:
        description: 'Task ID for the job'
        required: true
      repo_url:
        description: 'Repository URL to analyze'
        required: true
      backend_url:
        description: 'Webhook URL of the CodeSentinel backend'
        required: true
      commit_sha:
        description: 'Optional commit SHA to analyze'
        required: false
        default: ''

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout CodeSentinel Code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: 'backend/requirements*.txt'
          
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
        
      - name: Install Sonar Scanner
        run: npm install -g sonarqube-scanner
        
      - name: Install Semgrep
        run: pip install semgrep
        
      - name: Install Python Dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install -r backend/requirements-worker.txt
          python -c "import tiktoken; tiktoken.get_encoding('cl100k_base')"
          
      - name: Run CodeSentinel AI Worker
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.WORKER_GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          TASK_ID: ${{ github.event.inputs.task_id }}
          REPO_URL: ${{ github.event.inputs.repo_url }}
          BACKEND_URL: ${{ github.event.inputs.backend_url }}
          COMMIT_SHA: ${{ github.event.inputs.commit_sha }}
        run: |
          python backend/worker.py
