name: CodeSentinel CI/CD

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main
      - master

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger CodeSentinel Analysis
        run: |
          # Replace CODESENTINEL_URL with the actual deployed URL of your CodeSentinel instance
          CODESENTINEL_URL="${{ secrets.CODESENTINEL_URL }}"
          REPO_URL="https://github.com/${{ github.repository }}"
          
          if [ -z "$CODESENTINEL_URL" ]; then
            echo "Error: CODESENTINEL_URL secret is not set."
            exit 1
          fi

          echo "Triggering CodeSentinel analysis for $REPO_URL..."
          
          # We call the /api/analyze endpoint to queue the repository.
          # The system will automatically fetch it, run the agents, and open PRs for any bugs found.
          curl -X POST "$CODESENTINEL_URL/api/analyze" \
               -H "Content-Type: application/json" \
               -d "{\"repo_url\": \"$REPO_URL\"}"
          
          echo "Analysis triggered successfully."
