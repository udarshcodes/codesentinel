name: Build and Deploy to Azure Container Apps

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY_LOGIN_SERVER: codesentinel.azurecr.io
  REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
  REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
  CONTAINER_APP_NAME: codesentinel-backend
  RESOURCE_GROUP: codesentinel-rg

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ env.REGISTRY_LOGIN_SERVER }}
          username: ${{ env.REGISTRY_USERNAME }}
          password: ${{ env.REGISTRY_PASSWORD }}

      - name: Build and Push Backend Docker Image
        run: |
          docker build -t ${{ env.REGISTRY_LOGIN_SERVER }}/${{ env.CONTAINER_APP_NAME }}:${{ github.sha }} ./backend
          docker push ${{ env.REGISTRY_LOGIN_SERVER }}/${{ env.CONTAINER_APP_NAME }}:${{ github.sha }}

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v1
        with:
          imageToDeploy: ${{ env.REGISTRY_LOGIN_SERVER }}/${{ env.CONTAINER_APP_NAME }}:${{ github.sha }}
          containerAppName: ${{ env.CONTAINER_APP_NAME }}
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          targetPort: 8000
          ingress: external
          # Enforcing resource limits to prevent scanning jobs from overwhelming the node
          cpu: 2.0
          memory: 4.0Gi
          
      - name: Verify Health and Rollback if Failed
        run: |
          echo "Azure Container Apps natively monitors the HEALTHCHECK."
          echo "If the revision fails to start or health probes fail, it halts traffic and sets revision to failed."
          echo "We will poll the revision status here, and if failed, we will rollback using Azure CLI."
          # Example rollback: az containerapp revision copy --name $CONTAINER_APP_NAME --resource-group $RESOURCE_GROUP ...
